<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearly Version 1 - Presentation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="noise-overlay"></div>
    </div>

    <div class="presentation-container">
        <div class="glass-card scene scene-1">
            <img src="logo.png" alt="Hearly Logo" class="logo">
            <h1>Introducing <span class="highlight">Hearly</span> Version 1 🌟</h1>
        </div>

        <div class="glass-card scene scene-2">
            <h2>Coz Modiji said <span class="highlight">WFH !!</span></h2>
        </div>

        <div class="glass-card scene scene-3">
            <h2>The <span class="highlight">Future of Work</span> is Here.</h2>
        </div>

        <div class="glass-card scene scene-4">
            <div class="tags">
                <span class="tag">#onlinemeetings</span>
                <span class="tag">#artificialintelligence</span>
                <span class="tag">#hearly</span>
            </div>
        </div>

        <div class="glass-card scene scene-5">
            <h2><span class="highlight">Seamless</span> Collaboration.</h2>
            <p>Empower your remote teams.</p>
        </div>

        <div class="glass-card scene scene-6">
            <h2>Because WFH should be <span class="highlight">effortless</span>.</h2>
        </div>

        <div class="glass-card scene scene-7">
            <img src="logo.png" alt="Hearly Logo" class="logo pulse">
            <h1 class="soon-text">Soon....!!</h1>
        </div>
        
        <div class="progress-bar-container">
            <div class="progress-bar"></div>
        </div>
    </div>
</body>
</html>
